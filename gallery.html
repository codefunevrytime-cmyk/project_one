<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Céleste — Event Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f0e8;
    min-height: 100vh;
    padding: 40px 24px 60px;
    color: #1a1008;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .page-tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,160,30,0.12);
    border: 1px solid rgba(255,160,30,0.35);
    border-radius: 100px;
    padding: 5px 14px;
    font-size: 11px;
    color: #b36b00;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 14px;
  }

  .page-tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ffa01e;
    animation: blink 1.4s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    color: #1a1008;
    line-height: 1.2;
    margin-bottom: 10px;
  }

  .page-title em { font-style: italic; color: #ffa01e; }

  .page-sub {
    font-size: 15px;
    color: #7a6a56;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── GRID ── */
  .grid-wrap { max-width: 1100px; margin: 0 auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .item {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 4/3;
    transition: transform 0.42s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.42s ease,
                filter 0.32s ease;
    z-index: 1;
    background: #c8b99a;
  }

  /* Blur siblings on hover */
  .grid:has(.item:hover) .item:not(:hover) {
    filter: blur(2.5px) brightness(0.65);
    transform: scale(0.95);
  }

  .item:hover {
    transform: scale(1.1);
    z-index: 20;
    box-shadow: 0 28px 70px rgba(26,16,8,0.42);
  }

  .item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.42s cubic-bezier(0.22,1,0.36,1);
  }

  .item:hover img { transform: scale(1.07); }

  /* Gradient overlay */
  .item-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top,
      rgba(15,8,2,0.92) 0%,
      rgba(15,8,2,0.15) 55%,
      transparent 100%);
    opacity: 0;
    transition: opacity 0.32s ease;
    display: flex;
    align-items: flex-end;
    padding: 18px;
  }

  .item:hover .item-overlay { opacity: 1; }

  /* Eye icon */
  .eye-icon {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(4px);
  }

  .item:hover .eye-icon { opacity: 1; transform: scale(1); }

  /* Hover card info */
  .item-mini { display: flex; gap: 10px; align-items: flex-end; width: 100%; }

  .item-mini-text { flex: 1; min-width: 0; }

  .item-mini-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ffa01e;
    margin-bottom: 4px;
  }

  .item-mini-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 5px;
  }

  .item-mini-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-chip { display: flex; align-items: center; gap: 3px; }

  .item-price {
    background: rgba(255,160,30,0.2);
    border: 1px solid rgba(255,160,30,0.45);
    border-radius: 9px;
    padding: 5px 11px;
    font-size: 13px;
    font-weight: 500;
    color: #ffa01e;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,8,2,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(6px);
  }

  .modal-backdrop.open { display: flex; }

  .modal-box {
    background: #faf7f2;
    border-radius: 22px;
    overflow: hidden;
    display: flex;
    max-width: 860px;
    width: 100%;
    max-height: 90vh;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    animation: modalIn 0.42s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(24px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-img-col {
    width: 42%;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .modal-img-col img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }

  .modal-img-col:hover img { transform: scale(1.04); }

  .modal-badge {
    position: absolute;
    top: 18px; left: 18px;
    background: rgba(255,160,30,0.92);
    color: #1a1008;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    border-radius: 8px;
    padding: 4px 11px;
  }

  .modal-content {
    flex: 1;
    padding: 32px 32px 28px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(26,16,8,0.08);
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #7a6a56;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
  }

  .modal-close:hover { background: rgba(26,16,8,0.15); color: #1a1008; }

  .modal-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ffa01e;
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1008;
    line-height: 1.25;
    margin-bottom: 20px;
  }

  .detail-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(26,16,8,0.1);
  }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .d-icon {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: rgba(26,16,8,0.07);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #7a6a56;
  }

  .d-label { color: #9e8e7a; width: 64px; flex-shrink: 0; }
  .d-val { color: #1a1008; font-weight: 500; }

  .pill-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }

  .pill {
    font-size: 11px;
    border-radius: 100px;
    padding: 4px 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .pill-amber { background: #faeeda; color: #633806; }
  .pill-teal  { background: #e1f5ee; color: #085041; }
  .pill-blue  { background: #e6f1fb; color: #0c447c; }

  .modal-desc {
    font-size: 13.5px;
    color: #5a4a36;
    line-height: 1.75;
    flex: 1;
    margin-bottom: 22px;
  }

  .modal-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    border-top: 1px solid rgba(26,16,8,0.1);
    padding-top: 18px;
  }

  .price-block {}
  .price-big {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #ffa01e;
  }

  .price-note { font-size: 11px; color: #9e8e7a; margin-top: 2px; }

  .footer-right { display: flex; align-items: center; gap: 10px; }

  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid rgba(26,16,8,0.15);
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    color: #1a1008;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }

  .nav-btn:hover { background: rgba(26,16,8,0.08); border-color: rgba(26,16,8,0.3); }

  .btn-book {
    background: #1a1008;
    color: #ffa01e;
    border: none;
    border-radius: 11px;
    padding: 11px 24px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-book::after {
    content: '';
    position: absolute;
    top: 0; left: -70%;
    width: 45%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,160,30,0.25), transparent);
    animation: shimmer 2.8s 1s ease infinite;
  }

  @keyframes shimmer { 0%{left:-70%;} 60%,100%{left:130%;} }

  .btn-book:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,16,8,0.3); }
  .btn-book:active { transform: scale(0.97); }

  /* Responsive */
  @media (max-width: 700px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .modal-box { flex-direction: column; max-height: 95vh; }
    .modal-img-col { width: 100%; height: 220px; flex-shrink: 0; }
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <div class="page-tag"><div class="page-tag-dot"></div>Our Events</div>
  <div class="page-title">Curated <em>Experiences</em><br>Worth Celebrating</div>

<!-- Grid -->
<div class="grid-wrap">

// ── BUILD GRID ──
function buildGrid() {
  const grid = document.getElementById('grid');
  events.forEach((e, i) => {

      <div class="item-overlay">

                <svg width="11" height="11" viewBox="0 0 16 16" fill="none">

                </svg>
                ${e.date}
              </span>
              <span class="meta-chip">
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
                  <path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-2.5-2-4.5-4.5-4.5z" stroke="rgba(255,255,255,0.65)" stroke-width="1.4" fill="none"/>
                </svg>
                ${e.location.split(',')[0]}
              </span>
            </div>
          </div>
          <div class="item-price">${e.price}</div>
        </div>
      </div>
    `;
    item.addEventListener('click', () => openModal(i));
    grid.appendChild(item);
  });
}

// ── OPEN MODAL ──
function openModal(i) {
  current = i;
  const e = events[i];
  document.getElementById('m-img').src = e.img;
  document.getElementById('m-img').alt = e.title;
  document.getElementById('m-badge').textContent = e.tag;
  document.getElementById('m-tag').textContent = e.tag;
  document.getElementById('m-title').textContent = e.title;
  document.getElementById('m-date').textContent = e.date;
  document.getElementById('m-loc').textContent = e.location;
  document.getElementById('m-time').textContent = e.time;
  document.getElementById('m-cap').textContent = e.capacity;
  document.getElementById('m-desc').textContent = e.desc;
  document.getElementById('m-price').textContent = e.price;

  const pillColors = ['pill-amber', 'pill-teal', 'pill-blue'];
  document.getElementById('m-pills').innerHTML = e.pills
    .map((p, j) => `<span class="pill ${pillColors[j % 3]}">${p}</span>`)
    .join('');

  // Re-trigger animation
  const box = document.getElementById('modal-box');
  box.style.animation = 'none';
  void box.offsetHeight;
  box.style.animation = '';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ── CLOSE MODAL ──
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  current = -1;
}

// ── BACKDROP CLICK ──
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// ── NAVIGATE ──
function navigate(dir) {
  if (current < 0) return;
  current = (current + dir + events.length) % events.length;
  openModal(current);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

buildGrid();
</script>
</body>
</html>
