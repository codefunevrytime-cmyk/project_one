<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Céleste — Sign In</title>
<link rel="stylesheet" href="/css/lo.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="scene">
  <div class="particles" id="particles"></div>

  <!-- Left branding -->
  <div class="left">
    <div class="l-bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="scan-line"></div>
    <div class="stub" style="top:32px;right:22px;width:90px;animation:stubFloat 3.5s ease-in-out infinite alternate">
      <div class="stub-bar"></div><div class="stub-bar" style="width:70%"></div><div class="stub-bar"></div>
    </div>
    <div class="stub" style="top:118px;right:38px;width:68px;animation:stubFloat 4.2s ease-in-out infinite alternate-reverse;opacity:.65">
      <div class="stub-bar" style="width:80%"></div><div class="stub-bar"></div>
    </div>
    <div class="stub" style="top:184px;right:12px;width:52px;animation:stubFloat 3s ease-in-out infinite alternate;animation-delay:-1s;opacity:.4">
      <div class="stub-bar"></div><div class="stub-bar" style="width:50%"></div>
    </div>
    <div class="l-inner">
      <div class="badge"><div class="badge-dot"></div>Event Planning Studio</div>
      <div class="l-title">Make every<br>moment <em>unforgettable.</em></div>
      <div class="l-sub">Plan, manage, and celebrate every event with elegance — from intimate dinners to grand galas.</div>
      <div class="stats">
        <div><div class="stat-num" id="c1">0+</div><div class="stat-lbl">Events Hosted</div></div>
        <div><div class="stat-num" id="c2">0+</div><div class="stat-lbl">Happy Clients</div></div>
        <div><div class="stat-num" id="c3">0</div><div class="stat-lbl">Cities</div></div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel-wrap">
    <div class="panel-topbar">
      <a href="/" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Home
      </a>
      <div class="topbar-logo">
        <div class="topbar-logo-icon">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M10 2l1.8 5.5H18l-4.9 3.6 1.8 5.5L10 13l-4.9 3.6 1.8-5.5L2 7.5h6.2L10 2z" fill="#ffa01e"/>
          </svg>
        </div>
        <span class="topbar-logo-name">Céleste</span>
      </div>
    </div>

    <div class="panel">
      <div class="form-title">Welcome back ✨</div>
      <div class="form-sub">Sign in to manage your upcoming events</div>

      <div class="field">
        <label>Email address</label>
        <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email"/>
        <div class="field-err" id="email-err"></div>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="pw-input" placeholder="••••••••" class="has-icon" autocomplete="current-password"/>
        <button class="eye-btn" type="button" id="pw-eye" onclick="toggleEye('pw-input','pw-eye')" aria-label="Show/hide password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <div class="field-err" id="pw-err"></div>
      </div>

      <div class="options-row">
        <label class="remember"><input type="checkbox" id="remember-me"/> Remember me</label>
        <button class="link-btn" type="button">Forgot password?</button>
      </div>

      <button class="btn-main" id="login-btn" onclick="handleLogin()">
        <div class="btn-shine"></div>
        Sign In to Dashboard
      </button>

      <div class="or-row"><span>or</span></div>

      <button class="btn-google" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-2.09 0 0 .13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="switch-text">
        New here? <a href="/signup">Create a free account →</a>
      </div>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
async function handleLogin() {
  let hasErr = false;
  const email = document.getElementById('email-input').value.trim();
  const pw = document.getElementById('pw-input').value;
  const remember = document.getElementById('remember-me').checked;

  // Client-side validation
  if (!email) { setErr('email-input','email-err','Email is required'); shakeInput('email-input'); hasErr=true; }
  else if (!isValidEmail(email)) { setErr('email-input','email-err','Enter a valid email address'); shakeInput('email-input'); hasErr=true; }
  else clearField('email-input','email-err');

  if (!pw) { setErr('pw-input','pw-err','Password is required'); shakeInput('pw-input'); hasErr=true; }
  else if (pw.length < 6) { setErr('pw-input','pw-err','Password must be at least 6 characters'); shakeInput('pw-input'); hasErr=true; }
  else clearField('pw-input','pw-err');

  if (hasErr) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const data = await apiPost('/api/login', { email, password: pw, remember });
    if (data.success) {
  localStorage.setItem('celeste_user', data.name);
  showToast(`✨ Welcome back, ${data.name}!`);
  setTimeout(() => window.location.href = data.redirect, 900);
    }
  else {
      btn.disabled = false;
      btn.innerHTML = '<div class="btn-shine"></div>Sign In to Dashboard';
      applyServerErrors(data.errors || []);
      if (data.errors && data.errors.length) showToast(data.errors[0].msg, 'error');
    }
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<div class="btn-shine"></div>Sign In to Dashboard';
    showToast('Network error — please try again', 'error');
  }
}

// Enter key submits
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// Live validation on blur
document.getElementById('email-input').addEventListener('blur', function() {
  if (!this.value) return clearField('email-input','email-err');
  if (!isValidEmail(this.value)) setErr('email-input','email-err','Enter a valid email address');
  else setErr('email-input','email-err','');
});
document.getElementById('pw-input').addEventListener('blur', function() {
  if (!this.value) return clearField('pw-input','pw-err');
  if (this.value.length < 6) setErr('pw-input','pw-err','Must be at least 6 characters');
  else setErr('pw-input','pw-err','');
});
</script>
</body>
</html>
